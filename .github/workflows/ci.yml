name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  # Docker Hub repository name
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/face-tracking-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU 
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-local:
    # 앞선 빌드-푸시 작업이 무사히 끝난 후에만 실행되도록 설정
    needs: build-and-push
    # 머지가 아닌 단순히 PR 올렸을 때는 배포되지 않도록 방지
    if: github.event_name != 'pull_request'
    # 선생님께서 등록하신 Self-Hosted Runner 환경에서 스크립트가 실행되게 합니다.
    runs-on: self-hosted
    
    steps:
      - name: Deploy Docker Container
        run: |
          echo "Deploying to local machine..."
          
          # 1. Docker Hub 로그인 (Rate Limit 제한 방지 및 Private 이미지 지원)
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # 2. 방금 막 빌드되어 올라간 최신 이미지 다운로드
          docker pull ${{ env.IMAGE_NAME }}:latest
          
          # 3. 기존에 실행 중이던 컨테이너가 있다면 안전하게 중지 및 삭제
          docker stop face-tracking-container || true
          docker rm face-tracking-container || true
          
          # 4. (선택사항) 용량 확보를 위해 더 이상 사용하지 않는 옛날 이미지 삭제
          docker image prune -f
          
          # 5. 새로운 컨테이너 백그라운드 구동! 
          # 8000번 포트로 브릿지 연결하고, 컴퓨터 재부팅시에도 켜지도록 restart 옵션 부여
          docker run -d \
            --name face-tracking-container \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ env.IMAGE_NAME }}:latest
            
          echo "Deployment successful! The API is running on localhost:8000"
